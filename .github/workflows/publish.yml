name: publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and verify artifacts without publishing.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches:
      - main
    paths:
      - catalog/**
      - modeljars/**
      - modeljars-catalog/**
      - modeljars-core/**
      - tools/**
      - build.gradle.kts
      - package.json
      - package-lock.json
      - settings.gradle.kts
      - .github/workflows/publish.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false' && 'release' || 'verify' }}
  cancel-in-progress: false

jobs:
  verify:
    name: Build release artifacts
    if: github.repository == 'ModelJars/modeljars'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install catalog tooling
        run: npm ci

      - name: Verify exact GGUF dimensions
        run: npm run catalog:enrich -- --concurrency=6

      - name: Build and verify
        run: >
          ./gradlew --no-daemon
          test
          verifyCatalog
          verifyRemoteCatalogMetadata
          publishToMavenLocal

  publish:
    name: Publish to Maven Central
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false'
    needs: verify
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify release credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$CENTRAL_USERNAME" ] || [ -z "$CENTRAL_PASSWORD" ]; then
            echo "Maven Central credentials are not configured in the maven-central environment." >&2
            exit 1
          fi
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "Signing credentials are not configured in the maven-central environment." >&2
            exit 1
          fi
          echo "Central publishing is intentionally gated until the publishing plugin is added."
          exit 1
