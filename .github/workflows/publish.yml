name: publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build and verify artifacts without publishing.
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      version:
        description: Maven version to stage when dry_run is false.
        required: true
        default: "0.1.0"
        type: string
  push:
    branches:
      - main
    paths:
      - catalog/**
      - modeljars/**
      - modeljars-catalog/**
      - modeljars-core/**
      - tools/**
      - build.gradle.kts
      - package.json
      - package-lock.json
      - settings.gradle.kts
      - .github/workflows/publish.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false' && 'release' || 'verify' }}
  cancel-in-progress: false

jobs:
  verify:
    name: Build release artifacts
    if: github.repository == 'ModelJars/modeljars'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Install catalog tooling
        run: npm ci

      - name: Verify exact GGUF dimensions
        run: npm run catalog:enrich -- --concurrency=6

      - name: Build and verify
        run: >
          ./gradlew --no-daemon
          test
          verifyCatalog
          verifyRemoteCatalogMetadata
          publishToMavenLocal

  publish:
    name: Publish to Maven Central
    if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false'
    needs: verify
    runs-on: ubuntu-latest
    environment: maven-central
    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm

      - name: Verify release credentials
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$CENTRAL_USERNAME" ] || [ -z "$CENTRAL_PASSWORD" ]; then
            echo "Maven Central credentials are not configured in the maven-central environment." >&2
            exit 1
          fi
          if [ -z "$GPG_PRIVATE_KEY" ] || [ -z "$GPG_PASSPHRASE" ]; then
            echo "Signing credentials are not configured in the maven-central environment." >&2
            exit 1
          fi

      - name: Install catalog tooling
        run: npm ci

      - name: Verify exact GGUF dimensions
        run: npm run catalog:enrich -- --concurrency=6

      - name: Clean release workspace
        run: ./gradlew --no-daemon clean

      - name: Build signed Central bundle
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MODELJARS_VERSION: ${{ inputs.version }}
        run: >
          ./gradlew --no-daemon
          check
          verifyRemoteCatalogMetadata
          verifyReleaseBundle
          releaseBundleZip
          -Prelease=true
          "-PmodeljarsVersion=${MODELJARS_VERSION}"

      - name: Attest Central bundle
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: build/release/modeljars-central-bundle.zip

      - name: Retain verified Central bundle
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: modeljars-central-bundle-${{ inputs.version }}
          path: build/release/modeljars-central-bundle.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload USER_MANAGED deployment
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MODELJARS_VERSION: ${{ inputs.version }}
        run: |
          authorization="$(printf '%s:%s' "$CENTRAL_USERNAME" "$CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          deployment_id="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${authorization}" \
              --form "bundle=@build/release/modeljars-central-bundle.zip;type=application/octet-stream" \
              "https://central.sonatype.com/api/v1/publisher/upload?name=modeljars-${MODELJARS_VERSION}&publishingType=USER_MANAGED"
          )"
          if ! printf '%s' "$deployment_id" | grep -Eq '^[0-9a-fA-F-]{36}$'; then
            echo "Central returned an invalid deployment ID." >&2
            exit 1
          fi
          {
            echo "### Maven Central deployment"
            echo
            echo "Uploaded ModelJars ${MODELJARS_VERSION} as USER_MANAGED deployment \`${deployment_id}\`."
            echo "Review and publish it in the Central Portal."
          } >> "$GITHUB_STEP_SUMMARY"
